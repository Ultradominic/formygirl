<script>
const no = document.getElementById("no");
const yes = document.getElementById("yes");

function getSafePosition() {
  const margin = 10;

  const maxX = window.innerWidth - no.offsetWidth - margin;
  const maxY = window.innerHeight - no.offsetHeight - margin;

  return {
    x: margin + Math.random() * (maxX - margin),
    y: margin + Math.random() * (maxY - margin)
  };
}

// старт рядом с "Да"
function placeStart() {
  const r = yes.getBoundingClientRect();

  no.style.position = "fixed";
  no.style.left = r.right + 30 + "px";
  no.style.top = r.top + "px";
}

function escapeFast() {
  const pos = getSafePosition();

  // быстрый "рывок"
  no.style.transition = "0.12s cubic-bezier(.2,.9,.2,1)";
  no.style.left = pos.x + "px";
  no.style.top = pos.y + "px";
}

// ПК — убегает при приближении
no.addEventListener("mouseenter", escapeFast);
no.addEventListener("mousemove", escapeFast);
no.addEventListener("click", escapeFast);

// МОБИЛА — убегает от пальца
document.addEventListener("touchmove", (e) => {
  const t = e.touches[0];
  if (!t) return;

  const rect = no.getBoundingClientRect();

  const dx = t.clientX - (rect.left + rect.width / 2);
  const dy = t.clientY - (rect.top + rect.height / 2);

  const dist = Math.sqrt(dx*dx + dy*dy);

  // чем ближе палец — тем быстрее убегает
  if (dist < 140) {
    escapeFast();
  }

}, { passive: true });

no.addEventListener("touchstart", escapeFast);

window.addEventListener("resize", placeStart);

setTimeout(placeStart, 150);
</script>
