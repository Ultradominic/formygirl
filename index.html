<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Вопрос ❤️</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial;
background:linear-gradient(45deg,#ff4d8d,#ff9acb,#ffd1e8);
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:30px;
border-radius:25px;
text-align:center;
color:white;
width:90%;
max-width:500px;
}

#screen2,#screen3{display:none;}

button{
padding:12px 25px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

#start{
background:white;
color:#ff4d8d;
}

.buttons{
position:relative;
width:300px;
height:140px;
margin:30px auto 0;
}

#yes{
position:absolute;
left:40px;
top:50px;
background:white;
color:#ff4d8d;
}

#no{
position:absolute;
left:160px;
top:50px;
background:#ff4d8d;
color:white;
transition:0.08s linear;
touch-action:none;
}
</style>
</head>

<body>

<div class="card" id="screen1">
<h1>❤️ У меня есть вопрос ❤️</h1>
<button id="start">Узнать</button>
</div>

<div class="card" id="screen2">
<h1>Пойдёшь со мной на свидание? ❤️</h1>

<div class="buttons">
<button id="yes">Да 💖</button>
<button id="no">Нет 🙈</button>
</div>
</div>

<div class="card" id="screen3">
<h1>💖 Урааа! 💖</h1>
<p>Теперь ждём наше свидание ❤️</p>
</div>

<script>

const screen1=document.getElementById("screen1");
const screen2=document.getElementById("screen2");
const screen3=document.getElementById("screen3");

const start=document.getElementById("start");
const yes=document.getElementById("yes");
const no=document.getElementById("no");
const box=document.querySelector(".buttons");

// ВАЖНО: нормальный клик на телефоне
start.addEventListener("click",()=>{
screen1.style.display="none";
screen2.style.display="block";
});

// движение "Нет"
function escape(){

const maxX=box.clientWidth-100;
const maxY=box.clientHeight-60;

const x=Math.random()*maxX;
const y=Math.random()*maxY;

no.style.left=x+"px";
no.style.top=y+"px";
}

// ПК
no.addEventListener("mouseenter",escape);

// МОБИЛА (главное исправление)
no.addEventListener("touchstart",(e)=>{
e.preventDefault();
escape();
},{passive:false});

// дополнительная защита
no.addEventListener("click",escape);

yes.addEventListener("click",()=>{

screen2.style.display="none";
no.style.display="none";
screen3.style.display="block";

// сердечки
for(let i=0;i<80;i++){
const h=document.createElement("div");
h.innerHTML="💖";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.top="-50px";
h.style.fontSize=(20+Math.random()*30)+"px";
h.style.animation="fall 3s linear forwards";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}

});

// анимация
const style=document.createElement("style");
style.innerHTML=`
@keyframes fall{
to{transform:translateY(110vh);opacity:0;}
}
`;
document.head.appendChild(style);

</script>

</body>
</html>
